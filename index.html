<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="workspace-shell">
<div id="input-panel">
  <div class="app-intro">
    <div>
      <h1>Discovery</h1>
    </div>
    <div class="archive-tools">
      <label for="archive-select">Archivio</label>
      <div class="archive-row">
        <select id="archive-select"></select>
        <button class="btn btn-small" type="button" onclick="createNewProject()">Nuovo</button>
        <button class="btn btn-small" type="button" onclick="saveCurrentProject()">Salva</button>
        <button class="btn btn-small" type="button" onclick="duplicateProject()">Duplica</button>
        <button class="btn btn-small btn-danger" type="button" onclick="deleteCurrentProject()">Elimina</button>
      </div>
    </div>
  </div>

  <div class="quality-strip" id="quality-strip">
    <div class="quality-kpi">
      <span class="quality-label">Qualita scheda</span>
      <span id="quality-score">0/100</span>
    </div>
    <div class="quality-bar"><span id="quality-bar-fill"></span></div>
    <div id="quality-state">Da completare</div>
    <button class="btn btn-small" type="button" onclick="applySmartSuggestions()">Auto-suggerisci</button>
  </div>
  <div id="validation-errors" class="validation-errors" aria-live="polite"></div>

  <div class="input-section">
    <h3>Generale</h3>
    <div class="form-grid">
      <div class="field"><label>Indirizzo progetto</label><input type="text" id="f_indirizzo" placeholder="Es. Via Labus, 1"></div>
      <div class="field"><label>Città</label><input type="text" id="f_citta" placeholder="Milano"></div>
      <div class="field"><label>Macro-zona</label><input type="text" id="f_macrozona" placeholder="Es. Bande Nere / Inganni"></div>
      <div class="field"><label>Micro-zona</label><input type="text" id="f_microzona" placeholder="Es. Primaticcio"></div>
      <div class="field"><label>Data analisi</label><input type="text" id="f_data" placeholder="Es. Luglio 2025"></div>
      <div class="field"><label>Ciclo di mercato</label>
        <select id="f_ciclo">
          <option value="">— seleziona —</option>
          <option>Crescita</option>
          <option>Maturazione</option>
          <option>Contrazione</option>
          <option>Ripresa</option>
        </select>
      </div>
    </div>
  </div>

  <div class="input-section">
    <h3>Prezzi</h3>
    <div class="form-grid four">
      <div class="field"><label>€/mq Milano generale</label><input type="number" id="f_mq_milano" placeholder="Es. 5100"></div>
      <div class="field"><label>€/mq Macro-zona</label><input type="number" id="f_mq_macro" placeholder="Es. 4400"></div>
      <div class="field"><label>€/mq Micro-zona</label><input type="number" id="f_mq_micro" placeholder="Es. 4148"></div>
      <div class="field"><label>€/mq Nostro BP</label><input type="number" id="f_mq_bp" placeholder="Es. 5115"></div>
    </div>
    <div class="form-grid four spaced-grid">
      <div class="field"><label>€/mq Nuovo/In costr.</label><input type="number" id="f_mq_nuovo" placeholder="Es. 4934"></div>
      <div class="field"><label>€/mq Ottimo/Ristr.</label><input type="number" id="f_mq_ottimo" placeholder="Es. 4639"></div>
      <div class="field"><label>€/mq Compravenduto</label><input type="number" id="f_mq_cv" placeholder="Es. 3639"></div>
      <div class="field"><label>Scarto asking/closing %</label><input type="number" id="f_scarto" placeholder="Es. -12"></div>
    </div>
    <div class="form-grid spaced-grid">
      <div class="field"><label>Motivazione PREMIO</label><textarea id="f_premio" placeholder="Es. Piano alto, classe A+, unico nuovo in zona, affacci liberi..."></textarea></div>
      <div class="field"><label>Motivazione DEPREZZAMENTO</label><textarea id="f_deprezzo" placeholder="Es. Piano terra, loft atipico, contesto non premiante..."></textarea></div>
    </div>
  </div>

  <div class="input-section">
    <h3>Metriche</h3>
    <div class="form-grid three">
      <div class="field"><label>Rating mercato</label><textarea id="m1_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Prezzi annunci</label><textarea id="m2_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Prezzi compravendite</label><textarea id="m3_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Volumi di mercato</label><textarea id="m4_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Stock disponibile</label><textarea id="m5_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Efficienza energetica</label><textarea id="m6_note" placeholder="Nota breve"></textarea></div>
      <div class="field"><label>Mix dimensionale</label><textarea id="m7_note" placeholder="Nota breve"></textarea></div>
    </div>
  </div>

  <div class="input-section">
    <div class="section-toolbar">
      <div>
        <h3>Cantieri</h3>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table id="cantieri-table">
        <thead>
          <tr>
            <th style="min-width:130px">Nome / ID Cantiere</th>
            <th style="min-width:160px">Indirizzo completo</th>
            <th style="min-width:70px">Zona</th>
            <th style="min-width:50px">N° unità</th>
            <th style="min-width:80px">Inizio lavori</th>
            <th style="min-width:90px">Tipologia prevalente</th>
            <th style="min-width:60px">Sup. media (mq)</th>
            <th style="min-width:75px">€/mq medio</th>
            <th style="min-width:55px">Cl. Energ.</th>
            <th style="min-width:80px">Stato assorbim.</th>
            <th style="min-width:30px"></th>
          </tr>
        </thead>
        <tbody id="cantieri-tbody"></tbody>
      </table>
    </div>
    <div class="actions-bar section-actions">
      <button class="btn btn-small" type="button" onclick="addCantiere()">+ Aggiungi cantiere</button>
    </div>
  </div>

  <div class="input-section">
    <div class="section-toolbar">
      <div>
        <h3>Ipotesi</h3>
      </div>
      <button class="btn btn-small" type="button" onclick="addIpotesi()">+ Aggiungi ipotesi</button>
    </div>
    <div id="ipotesi-container"></div>
  </div>

  <div class="input-section">
    <h3>Takeaway</h3>
    <div class="form-grid full">
      <div class="field"><label>Takeaway 1</label><input type="text" id="tw1" placeholder="Es. Punta su trilocali 80-95 mq: unico gap di offerta nuova in zona..."></div>
      <div class="field"><label>Takeaway 2</label><input type="text" id="tw2" placeholder="Es. Classe A è moltiplicatore di prezzo, non optional..."></div>
      <div class="field"><label>Takeaway 3</label><input type="text" id="tw3" placeholder="Es. Pre-selling consigliato: NTN in calo rende rischioso costruire senza demand test..."></div>
    </div>
    <div class="form-grid spaced-grid">
      <div class="field"><label>Timeline commercializzazione</label><textarea id="val_timeline" placeholder="Es. Avviare pre-selling al 30% avanzamento lavori. Primo ribasso programmato dopo 75 gg senza preliminari..."></textarea></div>
      <div class="field"><label>Test di validazione layout</label><textarea id="val_test" placeholder="Es. Pubblica bilocale 60 mq piano 4° e misura lead in 30 gg..."></textarea></div>
    </div>
  </div>

  <div class="input-section">
    <h3>Decisione</h3>
    <div class="form-grid three">
      <div class="field"><label>Decisione</label>
        <select id="d_esito">
          <option value="">- seleziona -</option>
          <option>GO</option>
          <option>GO condizionato</option>
          <option>NO GO</option>
        </select>
      </div>
      <div class="field"><label>Confidenza %</label><input type="number" id="d_conf" min="0" max="100" placeholder="Es. 78"></div>
      <div class="field"><label>Orizzonte verifica</label><input type="text" id="d_when" placeholder="Es. 60 giorni"></div>
    </div>
    <div class="form-grid spaced-grid">
      <div class="field"><label>Motivazione decisione</label><textarea id="d_reason" placeholder="Sintesi breve delle evidenze decisive"></textarea></div>
      <div class="field"><label>Prossimo passo</label><textarea id="d_next" placeholder="Azione immediata da avviare"></textarea></div>
    </div>
  </div>

  <div class="actions-bar primary-actions">
    <button class="btn btn-accent" type="button" onclick="generateDoc()">Genera documento A4</button>
    <button class="btn" type="button" onclick="window.print()">Stampa / Esporta PDF</button>
  </div>
</div>

<aside id="live-panel" class="no-print">
  <div class="live-card">
    <div class="live-header">
      <h2>Live</h2>
      <span id="live-project-name">Nuova scheda</span>
    </div>
    <div id="live-quality" class="live-pill">Qualita 0/100</div>
    <div id="live-warnings" class="live-warnings"></div>
    <div id="live-summary" class="live-summary"></div>
    <div class="live-actions">
      <button class="btn btn-accent" type="button" onclick="generateDoc()">Genera documento A4</button>
      <button class="btn" type="button" onclick="window.print()">Stampa / Esporta PDF</button>
    </div>
  </div>
</aside>
</div>

<div id="doc-output">
  <div class="no-print preview-toolbar">
    <span class="preview-label">Discovery</span>
    <button class="btn btn-small" type="button" onclick="backToInput()">Modifica</button>
    <button class="btn btn-small btn-accent" type="button" onclick="window.print()">Stampa / PDF</button>
  </div>
  <div class="page" id="doc-page"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="./app.js"></script>
</body>
</html>
