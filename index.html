<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovery</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="input-panel">
  <div class="app-intro">
    <div>
      <h1>Discovery</h1>
    </div>
  </div>

  <div class="input-section">
    <h3>Dati generali</h3>
    <div class="form-grid">
      <div class="field"><label>Indirizzo progetto</label><input type="text" id="f_indirizzo" placeholder="Es. Via Labus, 1"></div>
      <div class="field"><label>Città</label><input type="text" id="f_citta" placeholder="Milano"></div>
      <div class="field"><label>Macro-zona</label><input type="text" id="f_macrozona" placeholder="Es. Bande Nere / Inganni"></div>
      <div class="field"><label>Micro-zona</label><input type="text" id="f_microzona" placeholder="Es. Primaticcio"></div>
      <div class="field"><label>Data analisi</label><input type="text" id="f_data" placeholder="Es. Luglio 2025"></div>
      <div class="field"><label>Ciclo di mercato</label>
        <select id="f_ciclo">
          <option value="">— seleziona —</option>
          <option>Crescita</option>
          <option>Maturazione</option>
          <option>Contrazione</option>
          <option>Ripresa</option>
        </select>
      </div>
    </div>
  </div>

  <div class="input-section">
    <h3>Prezzi annunci</h3>
    <div class="form-grid four">
      <div class="field"><label>€/mq Milano generale</label><input type="number" id="f_mq_milano" placeholder="Es. 5100"></div>
      <div class="field"><label>€/mq Macro-zona</label><input type="number" id="f_mq_macro" placeholder="Es. 4400"></div>
      <div class="field"><label>€/mq Micro-zona</label><input type="number" id="f_mq_micro" placeholder="Es. 4148"></div>
      <div class="field"><label>€/mq Nostro BP</label><input type="number" id="f_mq_bp" placeholder="Es. 5115"></div>
    </div>
    <div class="form-grid four spaced-grid">
      <div class="field"><label>€/mq Nuovo/In costr.</label><input type="number" id="f_mq_nuovo" placeholder="Es. 4934"></div>
      <div class="field"><label>€/mq Ottimo/Ristr.</label><input type="number" id="f_mq_ottimo" placeholder="Es. 4639"></div>
      <div class="field"><label>€/mq Compravenduto</label><input type="number" id="f_mq_cv" placeholder="Es. 3639"></div>
      <div class="field"><label>Scarto asking/closing %</label><input type="number" id="f_scarto" placeholder="Es. -12"></div>
    </div>
    <div class="form-grid spaced-grid">
      <div class="field"><label>Motivazione PREMIO</label><textarea id="f_premio" placeholder="Es. Piano alto, classe A+, unico nuovo in zona, affacci liberi..."></textarea></div>
      <div class="field"><label>Motivazione DEPREZZAMENTO</label><textarea id="f_deprezzo" placeholder="Es. Piano terra, loft atipico, contesto non premiante..."></textarea></div>
    </div>
  </div>

  <div class="input-section">
    <h3>Le 7 metriche</h3>
    <div class="form-grid three">
      <div class="field"><label>Rating mercato — titolo sintetico</label><input type="text" id="m1_title" placeholder="Es. B/C — Mercato in maturazione"></div>
      <div class="field"><label>Rating mercato — colore</label><select id="m1_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Rating mercato — sintesi</label><input type="text" id="m1_body" placeholder="Es. Appeal medio-basso, liquidità CB, ciclo in crescita..."></div>
      <div class="field"><label>Prezzi annunci — titolo</label><input type="text" id="m2_title" placeholder="Es. ↑ Crescita"></div>
      <div class="field"><label>Prezzi annunci — colore</label><select id="m2_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Prezzi annunci — sintesi</label><input type="text" id="m2_body" placeholder="Es. Pressione rialzo su tutti i segmenti..."></div>
      <div class="field"><label>Prezzi compravendite — titolo</label><input type="text" id="m3_title" placeholder="Es. 3.639 €/mq"></div>
      <div class="field"><label>Prezzi compravendite — colore</label><select id="m3_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Prezzi compravendite — sintesi</label><input type="text" id="m3_body" placeholder="Es. Valori reali solidi, trend stabile..."></div>
      <div class="field"><label>Volumi di mercato — titolo</label><input type="text" id="m4_title" placeholder="Es. ↓ NTN -68%"></div>
      <div class="field"><label>Volumi di mercato — colore</label><select id="m4_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Volumi di mercato — sintesi</label><input type="text" id="m4_body" placeholder="Es. NTN in calo, mercato compresso su tagli compatti..."></div>
      <div class="field"><label>Stock disponibile — titolo</label><input type="text" id="m5_title" placeholder="Es. 127 ann."></div>
      <div class="field"><label>Stock disponibile — colore</label><select id="m5_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Stock disponibile — sintesi</label><input type="text" id="m5_body" placeholder="Es. Offerta abbondante, assorbimento lento..."></div>
      <div class="field"><label>Efficienza energetica — titolo</label><input type="text" id="m6_title" placeholder="Es. Opportunità A"></div>
      <div class="field"><label>Efficienza energetica — colore</label><select id="m6_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Efficienza energetica — sintesi</label><input type="text" id="m6_body" placeholder="Es. Quota green quasi assente, gap €/mq tra classi = 457..."></div>
      <div class="field"><label>Mix dimensionale — titolo</label><input type="text" id="m7_title" placeholder="Es. 75-94 mq"></div>
      <div class="field"><label>Mix dimensionale — colore</label><select id="m7_color"><option value="neutral">Neutro</option><option value="pos">Positivo</option><option value="alert">Critico</option><option value="opp">Opportunità</option></select></div>
      <div class="field"><label>Mix dimensionale — sintesi</label><input type="text" id="m7_body" placeholder="Es. Trilocali 42%, bilo 30%, sup. media cercata 75 mq..."></div>
    </div>
  </div>

  <div class="input-section">
    <div class="section-toolbar">
      <div>
        <h3>Cantieri limitrofi</h3>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table id="cantieri-table">
        <thead>
          <tr>
            <th style="min-width:130px">Nome / ID Cantiere</th>
            <th style="min-width:160px">Indirizzo completo</th>
            <th style="min-width:70px">Zona</th>
            <th style="min-width:50px">N° unità</th>
            <th style="min-width:80px">Inizio lavori</th>
            <th style="min-width:90px">Tipologia prevalente</th>
            <th style="min-width:60px">Sup. media (mq)</th>
            <th style="min-width:75px">€/mq medio</th>
            <th style="min-width:55px">Cl. Energ.</th>
            <th style="min-width:80px">Stato assorbim.</th>
            <th style="min-width:30px"></th>
          </tr>
        </thead>
        <tbody id="cantieri-tbody"></tbody>
      </table>
    </div>
    <div class="actions-bar section-actions">
      <button class="btn btn-small" type="button" onclick="addCantiere()">+ Aggiungi cantiere</button>
    </div>
  </div>

  <div class="input-section">
    <div class="section-toolbar">
      <div>
        <h3>Le 4 ipotesi di sviluppo</h3>
      </div>
      <button class="btn btn-small" type="button" onclick="addIpotesi()">+ Aggiungi ipotesi</button>
    </div>
    <div id="ipotesi-container"></div>
  </div>

  <div class="input-section">
    <h3>Takeaway e validazione</h3>
    <div class="form-grid full">
      <div class="field"><label>Takeaway 1</label><input type="text" id="tw1" placeholder="Es. Punta su trilocali 80-95 mq: unico gap di offerta nuova in zona..."></div>
      <div class="field"><label>Takeaway 2</label><input type="text" id="tw2" placeholder="Es. Classe A è moltiplicatore di prezzo, non optional..."></div>
      <div class="field"><label>Takeaway 3</label><input type="text" id="tw3" placeholder="Es. Pre-selling consigliato: NTN in calo rende rischioso costruire senza demand test..."></div>
    </div>
    <div class="form-grid spaced-grid">
      <div class="field"><label>Timeline commercializzazione</label><textarea id="val_timeline" placeholder="Es. Avviare pre-selling al 30% avanzamento lavori. Primo ribasso programmato dopo 75 gg senza preliminari..."></textarea></div>
      <div class="field"><label>Test di validazione layout</label><textarea id="val_test" placeholder="Es. Pubblica bilocale 60 mq piano 4° e misura lead in 30 gg..."></textarea></div>
    </div>
  </div>

  <div class="actions-bar primary-actions">
    <button class="btn btn-accent" type="button" onclick="generateDoc()">Genera documento A4</button>
    <button class="btn" type="button" onclick="window.print()">Stampa / Esporta PDF</button>
  </div>
</div>

<div id="doc-output">
  <div class="no-print preview-toolbar">
    <span class="preview-label">Discovery</span>
    <button class="btn btn-small" type="button" onclick="backToInput()">Modifica</button>
    <button class="btn btn-small btn-accent" type="button" onclick="window.print()">Stampa / PDF</button>
  </div>
  <div class="page" id="doc-page"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="./app.js"></script>
</body>
</html>
